spring.application.name=backend-spring

# H2 en memoria para Sprint 1 (Foundation).
# TODO: reemplazar por configuracion de MySQL cuando se definan las entidades de negocio.
spring.datasource.url=jdbc:h2:mem:aicoursegenerator
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Integracion con la API de Anthropic (Claude).
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.base-url=https://api.anthropic.com
anthropic.api.model=claude-sonnet-4-6
anthropic.api.max-tokens=2048
